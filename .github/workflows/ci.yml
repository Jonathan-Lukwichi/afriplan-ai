name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ── DXF pipeline: deterministic, no network ───────────────────────
  dxf-pipeline:
    name: DXF pipeline tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ezdxf pydantic pytest
      - name: Run DXF unit tests
        run: pytest tests/dxf_pipeline/ -v --tb=short
      - name: Architectural independence
        run: pytest tests/architecture/ -v --tb=short

  # ── PDF pipeline: mocked LLM, no network ──────────────────────────
  pdf-pipeline:
    name: PDF pipeline tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run PDF unit tests with mocked Anthropic client
        # No ANTHROPIC_API_KEY in CI — the conftest provides MockAnthropic
        run: pytest tests/pdf_pipeline/ -v --tb=short

  # ── Comparison + shared models ────────────────────────────────────
  comparison:
    name: Comparison + shared models
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dxf-pipeline, pdf-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run comparison tests
        run: pytest tests/comparison/ -v --tb=short
      - name: Run any remaining shared / smoke tests
        run: pytest tests/ -v --tb=short --ignore=tests/dxf_pipeline --ignore=tests/pdf_pipeline --ignore=tests/comparison --ignore=tests/architecture
        continue-on-error: true
